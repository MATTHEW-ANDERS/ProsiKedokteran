<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sayang Bunda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>🌸 Admin Bunda</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#">📊 Dashboard</a></li>
                <li><a href="#">📋 Data Responden</a></li>
                <li><a href="#">⚙️ Pengaturan</a></li>
                <li style="cursor: pointer;" onclick="if(confirm('Apakah Anda yakin ingin keluar?')) window.location.replace('index.html');">
                <a href="javascript:void(0)" style="color: #ff4d4d; display: inline-block; width: 100%; height: 100%; pointer-events: none;">🚪 Keluar</a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>Data Responden Kuesioner</h1>
                <div class="admin-profile">Halo, Admin Dokter! 👩‍⚕️</div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Responden</h3>
                    <h2 id="totalResponden">0</h2>
                </div>
                <div class="stat-card">
                    <h3>Sudah Mengisi (Bulan Ini)</h3>
                    <h2 id="totalSudah" style="color: #2ecc71;">0</h2>
                </div>
                <div class="stat-card">
                    <h3>Belum Mengisi</h3>
                    <h2 id="totalBelum" style="color: #e74c3c;">0</h2>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h2>Daftar Pantauan Responden</h2>
                    <button class="btn-export" onclick="exportToCSV()">📥 Export ke Excel/Sheets (.csv)</button>
                </div>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Bunda</th>
                            <th>No HP</th>
                            <th>Status Pengisian</th>
                            <th>Pembaruan Terakhir</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
